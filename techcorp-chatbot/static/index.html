<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechCorp — AI Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --border:    #1e2130;
      --border-hi: #2a2f45;
      --text:      #e2e6f0;
      --muted:     #636880;
      --accent:    #4f7cff;
      --accent-lo: #4f7cff18;
      --accent-hi: #7ba0ff;
      --green:     #22c55e;
      --user-bg:   #1a1f2e;
      --bot-bg:    #111318;
      --radius:    14px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-rows: 64px 1fr 80px;
      height: 100dvh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(10,12,16,0.85);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f7cff, #a855f7);
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 14px; font-weight: 600;
      letter-spacing: -.01em;
    }
    .header-info p {
      font-size: 11px; color: var(--muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px #22c55e33;
      margin-left: auto;
      flex-shrink: 0;
    }

    .clear-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: inherit;
      font-size: 12px; padding: 5px 12px;
      border-radius: 6px; cursor: pointer;
      transition: all .15s;
    }
    .clear-btn:hover { border-color: var(--border-hi); color: var(--text); }

    /* ── Messages ── */
    #messages {
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 14px;
      margin-top: 2px;
    }
    .avatar.bot {
      background: linear-gradient(135deg, #4f7cff22, #a855f722);
      border: 1px solid var(--border);
      font-size: 15px;
    }
    .avatar.user {
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 13px; font-weight: 600;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      position: relative;
    }
    .msg-row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      color: var(--text);
    }
    .msg-row.user .bubble {
      background: var(--accent-lo);
      border: 1px solid #4f7cff30;
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      color: var(--text);
    }

    .timestamp {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .timestamp { text-align: right; }

    /* cursor blink */
    .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--accent);
      border-radius: 1px;
      animation: blink .7s infinite;
      vertical-align: middle;
      margin-left: 1px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Welcome card ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 20px 20px;
      gap: 16px;
    }
    .welcome-icon {
      width: 60px; height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f7cff, #a855f7);
      display: grid; place-items: center;
      font-size: 28px;
      box-shadow: 0 0 40px #4f7cff33;
    }
    .welcome h2 { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
    .welcome p { font-size: 13px; color: var(--muted); max-width: 340px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 4px;
    }
    .suggestion {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px; font-family: inherit;
      color: var(--muted); background: none;
      cursor: pointer; transition: all .15s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent-hi);
      background: var(--accent-lo);
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    #input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .15s;
    }
    #input::placeholder { color: var(--muted); }
    #input:focus { border-color: var(--accent); }

    #send {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: var(--accent);
      border: none; cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send:hover { background: var(--accent-hi); }
    #send:active { transform: scale(.94); }
    #send:disabled { background: var(--border); cursor: not-allowed; }
    #send svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      font-size: 11px; color: var(--muted);
      text-align: center;
      padding-bottom: 6px;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="logo">⚡</div>
    <div class="header-info">
      <h1>Aria — TechCorp Support</h1>
      <p>Powered by Groq · llama-3.3-70b</p>
    </div>
    <div class="status-dot" title="Online"></div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hi, I'm Aria!</h2>
      <p>TechCorp's AI support assistant. Ask me anything about our products, pricing, or account help — in English or Türkçe.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">What plans do you offer?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Is there a free trial?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Planlarınız nelerdir?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Ücretsiz deneme var mı?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div>
    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="Ask Aria anything... · Türkçe yazabilirsiniz"></textarea>
      <button id="send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  let history = [];   // {role, content}
  let streaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, content = '') {
    hideWelcome();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? '🤖' : 'U';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(avatar);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function setCursor(bubble, show) {
    const existing = bubble.querySelector('.cursor');
    if (show && !existing) {
      const c = document.createElement('span');
      c.className = 'cursor';
      bubble.appendChild(c);
    } else if (!show && existing) {
      existing.remove();
    }
  }

  async function sendMessage(text) {
    const msg = (text || inputEl.value).trim();
    if (!msg || streaming) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    hideWelcome();

    // User bubble
    appendMessage('user', msg);
    history.push({ role: 'user', content: msg });

    // Bot bubble (streaming)
    const botBubble = appendMessage('bot', '');
    setCursor(botBubble, true);
    streaming = true;
    sendBtn.disabled = true;

    let fullText = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const chunk = JSON.parse(data);
            if (chunk.content) {
              fullText += chunk.content;
              botBubble.textContent = fullText;
              setCursor(botBubble, true);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (chunk.error) {
              botBubble.textContent = '⚠️ ' + chunk.error;
            }
          } catch {}
        }
      }
    } catch (err) {
      botBubble.textContent = '⚠️ Connection error. Please try again.';
    }

    setCursor(botBubble, false);
    if (fullText) history.push({ role: 'assistant', content: fullText });
    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendSuggestion(btn) {
    sendMessage(btn.textContent);
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Hi, I'm Aria!</h2>
        <p>TechCorp's AI support assistant. Ask me anything about our products, pricing, or account help — in English or Türkçe.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">What plans do you offer?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Is there a free trial?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Planlarınız nelerdir?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Ücretsiz deneme var mı?</button>
        </div>
      </div>`;
  }
</script>
</body>
</html>
